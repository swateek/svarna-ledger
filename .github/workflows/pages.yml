name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "SUPABASE_URL and SUPABASE_PUBLISHABLE_KEY secrets must be set"
            exit 1
          fi
          python3 -c "
          import os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_PUBLISHABLE_KEY']
          with open('docs/config.js', 'w') as f:
              f.write('// Generated at deploy time — do not commit\n')
              f.write(f'window.SUPABASE_URL = {url!r};\n')
              f.write(f'window.SUPABASE_PUBLISHABLE_KEY = {key!r};\n')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
